<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link
			rel="shortcut icon"
			type="image/x-icon"
			href="../../assets/images/logo_33.webp"
		/>
		<title>Pictos — Expedition 33</title>
		<style>
			*, *::before, *::after {
				box-sizing: border-box;
			}

			html {
				scroll-behavior: smooth;
			}

			body {
				background-color: #121212;
				color: #e0e0e0;
				font-family: Arial, sans-serif;
				line-height: 1.6;
				margin: 0;
				padding: 0;
			}

			/* ── Sidebar ─────────────────────────────── */

			#sidebar {
				position: fixed;
				top: 0;
				left: 0;
				width: 250px;
				height: 100vh;
				background: #0d0d0d;
				border-right: 1px solid #1e1e1e;
				display: flex;
				flex-direction: column;
				z-index: 100;
			}

			#sidebar-header {
				padding: 1.25rem 1rem 0.9rem;
				border-bottom: 1px solid #1e1e1e;
				flex-shrink: 0;
			}

			#sidebar-title {
				color: #ffa94d;
				font-size: 0.65rem;
				font-weight: bold;
				text-transform: uppercase;
				letter-spacing: 0.15em;
				margin: 0 0 0.6rem 0;
				display: flex;
				align-items: center;
				justify-content: space-between;
			}

			#zone-count {
				font-size: 0.6rem;
				background: #1e1e1e;
				color: #666;
				padding: 1px 6px;
				border-radius: 10px;
				letter-spacing: 0;
				font-weight: normal;
			}

			#sidebar-search {
				width: 100%;
				background: #1a1a1a;
				border: 1px solid #2a2a2a;
				border-radius: 4px;
				color: #e0e0e0;
				font-size: 0.78rem;
				padding: 0.38rem 0.6rem;
				outline: none;
				transition: border-color 0.15s;
				font-family: Arial, sans-serif;
			}
			#sidebar-search::placeholder { color: #444; }
			#sidebar-search:focus { border-color: #ffa94d55; }

			#sidebar-nav {
				flex: 1;
				overflow-y: auto;
				padding: 0.4rem 0;
			}

			#sidebar-nav::-webkit-scrollbar { width: 3px; }
			#sidebar-nav::-webkit-scrollbar-track { background: transparent; }
			#sidebar-nav::-webkit-scrollbar-thumb {
				background: #252525;
				border-radius: 2px;
			}
			#sidebar-nav::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

			#sidebar-list {
				list-style: none;
				margin: 0;
				padding: 0;
			}

			#sidebar-list li a {
				display: block;
				padding: 0.28rem 1rem;
				font-size: 0.78rem;
				color: #606060;
				text-decoration: none;
				border-left: 2px solid transparent;
				transition: color 0.15s, background 0.15s, border-color 0.15s;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			#sidebar-list li a:hover {
				color: #cccccc;
				background: #191919;
				border-left-color: #ffa94d66;
			}

			#sidebar-list li a.active {
				color: #4dabf7;
				border-left-color: #4dabf7;
				background: #0c1a26;
				font-weight: normal;
			}

			#sidebar-list li.hidden {
				display: none;
			}

			/* ── Main layout ─────────────────────────── */

			#layout {
				margin-left: 250px;
			}

			#content {
				max-width: 800px;
				margin: 0 auto;
				padding: 2rem 2rem 4rem;
			}

			/* ── Content styles (existing) ───────────── */

			h1 {
				color: #ffa94d;
			}
			h2 {
				color: #4dabf7;
				font-size: 2rem;
				scroll-margin-top: 1.5rem;
			}
			h3 {
				color: #973434;
			}
			table {
				border-collapse: collapse;
				width: 100%;
				margin: 1rem 0;
			}
			th, td {
				border: 1px solid #333;
				padding: 8px;
			}
			th {
				background-color: #1e1e1e;
				color: #ffa94d;
				text-align: left;
			}
			code {
				background: #1e1e1e;
				color: #ffa94d;
				padding: 2px 4px;
				border-radius: 4px;
			}
			a {
				color: #4dabf7;
				text-decoration: none;
			}
			a:hover {
				color: #ffa94d;
			}
			blockquote {
				border-left: 4px solid #ffa94d;
				padding-left: 1rem;
				color: #ccc;
				font-style: italic;
			}
		</style>
	</head>
	<body>

		<!-- Sidebar -->
		<nav id="sidebar">
			<div id="sidebar-header">
				<div id="sidebar-title">
					Zones
					<span id="zone-count">—</span>
				</div>
				<input
					id="sidebar-search"
					type="text"
					placeholder="Filtrer les zones…"
					autocomplete="off"
					spellcheck="false"
				/>
			</div>
			<div id="sidebar-nav">
				<ul id="sidebar-list"></ul>
			</div>
		</nav>

		<!-- Main content -->
		<div id="layout">
			<div id="content"></div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<script>
			fetch("pictos.md")
				.then((res) => res.text())
				.then((text) => {
					document.getElementById("content").innerHTML = marked.parse(text);
					buildSidebar();
				});

			function slugify(str) {
				return str
					.toLowerCase()
					.normalize("NFD")
					.replace(/[̀-ͯ]/g, "")
					.replace(/[^a-z0-9\s-]/g, "")
					.replace(/\s+/g, "-")
					.replace(/-+/g, "-")
					.trim();
			}

			function buildSidebar() {
				const headings = document.querySelectorAll("#content h2");
				const list = document.getElementById("sidebar-list");
				const countEl = document.getElementById("zone-count");

				headings.forEach((h2) => {
					// marked already generates IDs; fallback if missing
					if (!h2.id) {
						h2.id = slugify(h2.textContent.trim());
					}

					const li = document.createElement("li");
					const a = document.createElement("a");
					a.href = "#" + h2.id;
					a.textContent = h2.textContent.trim();
					a.title = h2.textContent.trim();
					li.appendChild(a);
					list.appendChild(li);
				});

				countEl.textContent = headings.length;

				// Highlight active zone on scroll via IntersectionObserver
				const observer = new IntersectionObserver(
					(entries) => {
						entries.forEach((entry) => {
							if (!entry.isIntersecting) return;
							const id = entry.target.id;
							const link = list.querySelector(`a[href="#${CSS.escape(id)}"]`);
							if (!link) return;
							list.querySelectorAll("a.active").forEach((a) =>
								a.classList.remove("active")
							);
							link.classList.add("active");
							// Keep active link visible in sidebar
							link.scrollIntoView({ block: "nearest", behavior: "smooth" });
						});
					},
					{ rootMargin: "-5% 0px -88% 0px" }
				);

				headings.forEach((h2) => observer.observe(h2));

				// Search filter (accent-insensitive)
				document.getElementById("sidebar-search").addEventListener("input", function () {
					const q = slugify(this.value);
					list.querySelectorAll("li").forEach((li) => {
						const text = slugify(li.textContent);
						li.classList.toggle("hidden", q.length > 0 && !text.includes(q));
					});
				});
			}
		</script>
	</body>
</html>
