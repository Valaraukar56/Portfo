<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoW Build Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="container">
    <header>
      <div class="logo-wrap">
        <span class="logo-icon">&#9876;</span>
        <h1>WoW <span class="gold">Build Finder</span></h1>
      </div>
      <p class="subtitle">Trouve les meilleurs guides pour ta spé — instantanément.</p>
      <a href="https://maxroll.gg/wow/tierlists/high-mythic-plus-dps-tier-list" target="_blank" class="tierlist-btn">
        <span>&#9733;</span> Tier List M+ DPS
      </a>
    </header>

    <main>
      <div class="search-box">
        <div class="field-group">
          <label for="classInput">Classe</label>
          <div class="input-wrap">
            <input
              type="text"
              id="classInput"
              placeholder="ex: Chevalier de la mort, Guerrier..."
              autocomplete="off"
            />
            <div class="suggestions" id="classSuggestions"></div>
          </div>
        </div>

        <div class="field-group">
          <label for="specInput">Spécialisation</label>
          <div class="input-wrap">
            <input
              type="text"
              id="specInput"
              placeholder="ex: Impie, Fureur, Équilibre..."
              autocomplete="off"
            />
            <div class="suggestions" id="specSuggestions"></div>
          </div>
        </div>

        <button id="searchBtn">
          <span class="btn-icon">&#128269;</span>
          Trouver les guides
        </button>
      </div>

      <div id="results" class="results hidden">
        <div class="results-header">
          <h2>Guides pour <span id="resultLabel" class="gold"></span></h2>
        </div>
        <div class="cards" id="cards"></div>
        <p class="disclaimer">
          Les liens ouvrent les guides officiels sur chaque site. Utilise la recherche intégrée si ta spé n'est pas reconnue.
        </p>
      </div>

      <div id="quickLinks" class="quick-links">
        <h3>Spécialisations populaires</h3>
        <div class="chips" id="chips"></div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
